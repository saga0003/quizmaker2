name: Sync Cloudflare Dependencies

on:
  push:
    branches:
      - evidara-v6-7-production-commerce-cloudflare

permissions:
  contents: write

jobs:
  sync:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: evidara-v6-7-production-commerce-cloudflare
      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install pinned Cloudflare build dependencies
        run: npm install --save-dev @opennextjs/cloudflare@latest wrangler@latest
      - name: Commit reproducible npm metadata
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json
          if git diff --cached --quiet; then
            echo "Dependency metadata is already synchronized."
            exit 0
          fi
          git commit -m "Pin Cloudflare OpenNext build dependencies"
          git push origin HEAD:evidara-v6-7-production-commerce-cloudflare
