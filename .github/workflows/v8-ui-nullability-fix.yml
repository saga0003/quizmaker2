name: Apply V8 UI Nullability Fix

on:
  push:
    branches:
      - evidara-v8-papers

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: evidara-v8-papers
          fetch-depth: 0
      - name: Narrow Supabase client before delayed callback
        shell: python
        run: |
          from pathlib import Path
          path = Path('src/components/papers/QuestionGenerationStudio.tsx')
          text = path.read_text()
          old = '''  useEffect(() => {
              if (!supabase || !paperId || !selectedPaper) return;
              const timer = window.setTimeout(async () => {
                const result = await supabase.rpc("paper_question_availability_v8", {'''
          new = '''  useEffect(() => {
              const client = supabase;
              if (!client || !paperId || !selectedPaper) return;
              const timer = window.setTimeout(async () => {
                const result = await client.rpc("paper_question_availability_v8", {'''
          if old not in text:
              raise SystemExit('Expected availability callback was not found.')
          path.write_text(text.replace(old, new, 1))
      - name: Commit fix
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add src/components/papers/QuestionGenerationStudio.tsx
          git commit -m 'Fix generation availability client narrowing'
          git push origin HEAD:evidara-v8-papers
