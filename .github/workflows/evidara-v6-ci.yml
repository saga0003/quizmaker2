name: Evidara V6 CI

on:
  push:
    branches:
      - agent/evidara-v6-brand-intelligence
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout source
        uses: actions/checkout@v4
      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: TypeScript
        id: typecheck
        shell: bash
        run: |
          set +e
          npm run typecheck > typecheck.log 2>&1
          code=$?
          tail -120 typecheck.log
          exit $code
      - name: Upload TypeScript log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: evidara-typecheck-log
          path: typecheck.log
      - name: Production build
        if: steps.typecheck.outcome == 'success'
        shell: bash
        run: |
          set +e
          npm run build > production-build.log 2>&1
          code=$?
          tail -160 production-build.log
          exit $code
      - name: Upload production build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: evidara-production-build-log
          path: production-build.log
          if-no-files-found: ignore
