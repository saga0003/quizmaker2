name: Evidara V6.8 Production CI

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main

concurrency:
  group: evidara-v6-8-baseline-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout source
        uses: actions/checkout@v4
      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Generate production baseline report
        run: |
          set +e
          node scripts/production-baseline-smoke.mjs > production-baseline-report.txt 2>&1
          echo "$?" > production-baseline-status.txt
          cat production-baseline-report.txt
          exit 0
      - name: Upload production baseline report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: evidara-v6-8-production-baseline
          path: |
            production-baseline-report.txt
            production-baseline-status.txt
          if-no-files-found: error
          retention-days: 7
      - name: Enforce production baseline
        run: test "$(cat production-baseline-status.txt)" = "0"
      - name: ESLint report
        id: eslint
        continue-on-error: true
        run: npm run lint -- --format json --output-file eslint-v6-8-report.json
      - name: Upload ESLint report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: evidara-v6-8-baseline-eslint
          path: eslint-v6-8-report.json
          if-no-files-found: error
          retention-days: 3
      - name: Enforce ESLint
        if: steps.eslint.outcome == 'failure'
        run: |
          node -e 'const report=require("./eslint-v6-8-report.json"); for(const file of report){for(const issue of file.messages){console.error(`${file.filePath}:${issue.line}:${issue.column} ${issue.ruleId} ${issue.message}`)}}'
          exit 1
      - name: TypeScript
        run: npm run typecheck
      - name: Next.js production build
        run: npm run build
      - name: Cloudflare OpenNext build
        id: cloudflare
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          npm run cf:build 2>&1 | tee cloudflare-open-next-build.log
      - name: Upload Cloudflare build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: evidara-v6-8-cloudflare-build-log
          path: cloudflare-open-next-build.log
          if-no-files-found: error
          retention-days: 3
      - name: Enforce Cloudflare build
        if: steps.cloudflare.outcome == 'failure'
        run: |
          tail -n 200 cloudflare-open-next-build.log
          exit 1
