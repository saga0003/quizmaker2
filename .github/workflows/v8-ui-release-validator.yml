name: V8 UI Release Validator

on:
  push:
    branches:
      - evidara-v8-ui-refresh
      - evidara-v8-papers

permissions:
  contents: write

concurrency:
  group: v8-ui-release-validator-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-and-report:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 55
    env:
      NEXT_TELEMETRY_DISABLED: "1"
      NEXT_PUBLIC_APP_URL: http://localhost:3000
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Run independent gates
        shell: bash
        run: |
          set +e
          mkdir -p .qa-ui
          npm ci --no-audit --no-fund > .qa-ui/install.txt 2>&1; INSTALL=$?
          npm run lint > .qa-ui/lint.txt 2>&1; LINT=$?
          npm run typecheck > .qa-ui/typecheck.txt 2>&1; TYPECHECK=$?
          npm run qa:smoke > .qa-ui/base.txt 2>&1; BASE=$?
          npm run qa:phase1 > .qa-ui/phase1.txt 2>&1; PHASE1=$?
          npm run qa:phase2 > .qa-ui/phase2.txt 2>&1; PHASE2=$?
          npm run qa:phase3 > .qa-ui/phase3.txt 2>&1; PHASE3=$?
          npm run qa:ui > .qa-ui/ui.txt 2>&1; UI=$?
          npm run build > .qa-ui/next-build.txt 2>&1; NEXT=$?
          npm run cf:build > .qa-ui/cloudflare.txt 2>&1; CLOUDFLARE=$?
          node - <<'NODE' > .qa-ui/deployment-lock.txt 2>&1
          const config = require('./vercel.json');
          if (config.git?.deploymentEnabled !== false) process.exit(1);
          if (config.buildCommand !== 'npm run qa') process.exit(1);
          console.log('Vercel is fully disabled and npm run qa remains the future deployment gate.');
          NODE
          LOCK=$?
          printf 'INSTALL=%s\nLINT=%s\nTYPECHECK=%s\nBASE=%s\nPHASE1=%s\nPHASE2=%s\nPHASE3=%s\nUI=%s\nNEXT=%s\nCLOUDFLARE=%s\nLOCK=%s\n' "$INSTALL" "$LINT" "$TYPECHECK" "$BASE" "$PHASE1" "$PHASE2" "$PHASE3" "$UI" "$NEXT" "$CLOUDFLARE" "$LOCK" > .qa-ui/status.env
          exit 0

      - name: Write repository QA report
        shell: bash
        run: |
          source .qa-ui/status.env
          PASS=true
          for value in "$INSTALL" "$LINT" "$TYPECHECK" "$BASE" "$PHASE1" "$PHASE2" "$PHASE3" "$UI" "$NEXT" "$CLOUDFLARE" "$LOCK"; do
            if [ "$value" != "0" ]; then PASS=false; fi
          done
          {
            echo '# Evidara V8 Responsive UI — QA Report'
            echo
            echo "Validated commit: \`${GITHUB_SHA}\`"
            echo "Validated branch: \`${GITHUB_REF_NAME}\`"
            echo "Recorded at: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            echo "Overall result: **${PASS}**"
            echo
            echo '| Gate | Status |'
            echo '|---|---:|'
            echo "| Locked install | ${INSTALL} |"
            echo "| ESLint | ${LINT} |"
            echo "| TypeScript | ${TYPECHECK} |"
            echo "| Base smoke | ${BASE} |"
            echo "| Phase 1 smoke | ${PHASE1} |"
            echo "| Phase 2 smoke | ${PHASE2} |"
            echo "| Phase 3 smoke | ${PHASE3} |"
            echo "| Responsive UI smoke | ${UI} |"
            echo "| Next.js build | ${NEXT} |"
            echo "| Cloudflare/OpenNext build | ${CLOUDFLARE} |"
            echo "| Vercel deployment lock | ${LOCK} |"
            for file in .qa-ui/*.txt; do
              echo
              echo "## $(basename "$file")"
              echo '```text'
              tail -n 220 "$file"
              echo '```'
            done
          } > docs/V8_UI_QA_REPORT.md

      - name: Commit report
        shell: bash
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add docs/V8_UI_QA_REPORT.md
          git commit -m 'Record V8 responsive UI QA report' || exit 0
          git push origin HEAD:${GITHUB_REF_NAME}
