name: Finalize V6.7 Production Branch

on:
  push:
    branches:
      - evidara-v6-7-production-commerce-cloudflare

permissions:
  contents: write

jobs:
  finalize:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: evidara-v6-7-production-commerce-cloudflare
      - name: Correct production files
        shell: bash
        run: |
          python <<'PY'
          from pathlib import Path
          path = Path('supabase/functions/create-razorpay-order/index.ts')
          text = path.read_text()
          old = '.in("member_role", ["institute_owner", "institute_admin", "school_owner", "school_admin"])'
          new = '.in("member_role", ["institute_owner", "institute_admin"])'
          if old not in text:
              raise SystemExit('Expected school-role membership expression was not found.')
          path.write_text(text.replace(old, new))
          PY
          cat > public/_headers <<'EOF'
          /_next/static/*
            Cache-Control: public, max-age=31536000, immutable
          EOF
      - name: Commit corrections
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add supabase/functions/create-razorpay-order/index.ts public/_headers
          if git diff --cached --quiet; then
            echo "Production files are already finalized."
            exit 0
          fi
          git commit -m "Finalize Cloudflare runtime and school checkout roles"
          git push origin HEAD:evidara-v6-7-production-commerce-cloudflare
