name: Evidara V6.6 CI

on:
  push:
    branches:
      - evidara-v6-6-cloud-benchmarks
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout source
        uses: actions/checkout@v4
      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Verify benchmark schema targets
        run: |
          grep -q "public.question_papers" supabase/11_shared_benchmarks.sql
          grep -q "public.exam_attempts" supabase/11_shared_benchmarks.sql
          ! grep -q "public.assessments" supabase/11_shared_benchmarks.sql
          ! grep -q "public.attempts" supabase/11_shared_benchmarks.sql
          grep -q "start_benchmark_attempt" supabase/13_benchmark_cloud_operations.sql
          grep -q "sync_benchmark_contribution_from_attempt" supabase/13_benchmark_cloud_operations.sql
          grep -q "first-submission-only" supabase/15_benchmark_security_and_lifecycle_hardening.sql
          grep -q '"version": "6.6.0"' package.json
      - name: ESLint
        run: npm run lint
      - name: TypeScript
        run: npm run typecheck
      - name: Production build
        run: npm run build
