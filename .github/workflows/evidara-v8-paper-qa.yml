name: Evidara V8 Paper Builder QA

on:
  push:
    branches:
      - evidara-v8-paper-builder
  pull_request:
    branches:
      - evidara-v7-final-locked
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: evidara-v8-settings-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Apply, lint, typecheck, smoke and build
    runs-on: ubuntu-latest
    timeout-minutes: 40
    env:
      NEXT_TELEMETRY_DISABLED: "1"
      NEXT_PUBLIC_APP_URL: http://localhost:3000
    steps:
      - name: Check out V8 paper branch
        uses: actions/checkout@v4
        with:
          ref: evidara-v8-paper-builder
          fetch-depth: 0

      - name: Apply configurable academic settings
        shell: bash
        run: |
          set +e
          {
            set -euxo pipefail
            cat scripts/.v8-patch/part*.txt > /tmp/v8-settings.patch.gz.b64
            wc -c /tmp/v8-settings.patch.gz.b64
            sha256sum /tmp/v8-settings.patch.gz.b64
            base64 -d /tmp/v8-settings.patch.gz.b64 | gunzip > /tmp/v8-settings.patch
            wc -c /tmp/v8-settings.patch
            sha256sum /tmp/v8-settings.patch
            git show 796d8ca56091ed30949b28f5c5d0a7614d256129:.github/workflows/evidara-v8-paper-qa.yml > .github/workflows/evidara-v8-paper-qa.yml
            git show 796d8ca56091ed30949b28f5c5d0a7614d256129:.github/workflows/v8-source-export.yml > .github/workflows/v8-source-export.yml
            patch --batch --verbose -p1 < /tmp/v8-settings.patch
            rm -rf scripts/.v8-patch
            node scripts/v8-paper-smoke.mjs
            git config user.name "Evidara V8 Automation"
            git config user.email "actions@users.noreply.github.com"
            git add -A
            git commit -m "Add configurable grades and academic settings"
            git push origin HEAD:evidara-v8-paper-builder
          } > v8-apply.log 2>&1
          echo "$?" > v8-apply.status
          cat v8-apply.log
          exit 0

      - name: Upload patch diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: evidara-v8-apply-diagnostics
          path: |
            v8-apply.log
            v8-apply.status
          retention-days: 1

      - name: Enforce patch application
        run: test "$(cat v8-apply.status)" = "0"

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install locked dependencies
        run: npm ci --no-audit --no-fund

      - name: Lint
        run: npm run lint

      - name: TypeScript
        run: npm run typecheck

      - name: V8 paper smoke checks
        run: node scripts/v8-paper-smoke.mjs

      - name: Next.js production build
        run: npm run build
