name: Apply V9 Product Bundle

on:
  push:
    branches:
      - evidara-v9-product-catalogue
  pull_request:
    branches:
      - evidara-v8-paper-builder
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: apply-v9-product-bundle
  cancel-in-progress: false

jobs:
  apply:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Check out V9 product branch
        uses: actions/checkout@v4
        with:
          ref: evidara-v9-product-catalogue
          fetch-depth: 0

      - name: Reconstruct and apply V9 product module
        shell: bash
        run: |
          set -euo pipefail
          cat scripts/.v9-bundle/chunk*.txt > /tmp/v9-bundle.tar.xz.b64
          echo "aef0905f559d3c4937ba231647096be21ade27fce108f87ea90e6317c54e913c  /tmp/v9-bundle.tar.xz.b64" | sha256sum -c -
          base64 -d /tmp/v9-bundle.tar.xz.b64 > /tmp/v9-bundle.tar.xz
          echo "a6a49c7a459260fd77fc72c91c109af5035f732d59fedb0a277f983e6e9e67c7  /tmp/v9-bundle.tar.xz" | sha256sum -c -
          tar -xJf /tmp/v9-bundle.tar.xz
          rm -rf scripts/.v9-bundle scripts/.v9-patch
          rm -f .github/workflows/v9-source-export.yml
          rm -f .github/workflows/apply-v9-product-bundle.yml
          rm -f scripts/v9-source-export-trigger.txt
          node scripts/v9-product-smoke.mjs

      - name: Commit V9 product module
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "Evidara V9 Automation"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          git commit -m "Build V9 product catalogue and commerce module"
          git push origin HEAD:evidara-v9-product-catalogue
