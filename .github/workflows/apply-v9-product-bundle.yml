name: Apply V9 Product Bundle

on:
  push:
    branches:
      - evidara-v9-product-catalogue
  pull_request:
    branches:
      - evidara-v8-paper-builder
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: apply-v9-product-bundle
  cancel-in-progress: false

jobs:
  apply:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Check out V9 product branch
        uses: actions/checkout@v4
        with:
          ref: evidara-v9-product-catalogue
          fetch-depth: 0

      - name: Reconstruct, validate and commit V9 product module
        shell: bash
        run: |
          set +e
          {
            set -euxo pipefail
            python - <<'PY'
          from pathlib import Path

          repairs = {
              'chunk00.txt': (3936, 'O'),
              'chunk04.txt': (879, 'w'),
          }
          root = Path('scripts/.v9-bundle')
          for name, (index, expected) in repairs.items():
              path = root / name
              value = path.read_text()
              value = value[:index] + expected + value[index + 1:]
              path.write_text(value)

          path = root / 'chunk07.txt'
          value = path.read_text()
          if len(value) == 5999:
              value = value[:3304] + 'n' + value[3304:]
              path.write_text(value)
          if len(value) != 6000:
              raise SystemExit(f'Unexpected chunk07 length: {len(value)}')
          PY
            cat scripts/.v9-bundle/chunk*.txt > /tmp/v9-bundle.tar.xz.b64
            echo "aef0905f559d3c4937ba231647096be21ade27fce108f87ea90e6317c54e913c  /tmp/v9-bundle.tar.xz.b64" | sha256sum -c -
            base64 -d /tmp/v9-bundle.tar.xz.b64 > /tmp/v9-bundle.tar.xz
            echo "a6a49c7a459260fd77fc72c91c109af5035f732d59fedb0a277f983e6e9e67c7  /tmp/v9-bundle.tar.xz" | sha256sum -c -
            tar -xJf /tmp/v9-bundle.tar.xz
            node scripts/v9-product-smoke.mjs
            rm -rf scripts/.v9-bundle scripts/.v9-patch
            rm -f .github/workflows/v9-source-export.yml
            rm -f .github/workflows/apply-v9-product-bundle.yml
            rm -f scripts/v9-source-export-trigger.txt
            git config user.name "Evidara V9 Automation"
            git config user.email "actions@users.noreply.github.com"
            git add -A
            git status --short
            git commit -m "Build V9 product catalogue and commerce module"
            git push origin HEAD:evidara-v9-product-catalogue
          } > v9-apply.log 2>&1
          status="$?"
          echo "$status" > v9-apply.status
          cat v9-apply.log
          exit 0

      - name: Upload V9 apply diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: evidara-v9-apply-diagnostics
          path: |
            v9-apply.log
            v9-apply.status
          retention-days: 1

      - name: Enforce V9 bundle application
        run: test "$(cat v9-apply.status)" = "0"
