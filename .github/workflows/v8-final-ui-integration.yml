name: One-time V8 Final UI Integration

on:
  push:
    branches:
      - evidara-v8-papers

permissions:
  contents: write

jobs:
  patch:
    if: github.event.head_commit.message == 'Trigger V8 final UI integration'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: evidara-v8-papers

      - name: Integrate templates, exports, audit and replacement
        run: |
          python - <<'PY'
          from pathlib import Path

          builder_path = Path('src/components/papers/QuestionPaperBuilder.tsx')
          builder = builder_path.read_text()

          lifecycle_import = 'import { PaperLifecyclePanel } from "@/components/papers/PaperLifecyclePanel";\n'
          extra_imports = (
              'import { PaperTemplatePanel } from "@/components/papers/PaperTemplatePanel";\n'
              'import { PaperExportPanel } from "@/components/papers/PaperExportPanel";\n'
              'import { PaperAuditPanel } from "@/components/papers/PaperAuditPanel";\n'
          )
          if 'PaperTemplatePanel' not in builder:
              if lifecycle_import not in builder:
                  raise SystemExit('Lifecycle import anchor not found.')
              builder = builder.replace(lifecycle_import, lifecycle_import + extra_imports, 1)

          selected_type = '''type SelectedQuestion = PaperQuestionInput & {\n  snapshot: QuestionSnapshot;\n  usage_count?: number;\n};'''
          selected_replacement = '''type SelectedQuestion = PaperQuestionInput & {\n  paper_question_id?: string;\n  blueprint_rule_id?: string | null;\n  snapshot: QuestionSnapshot;\n  usage_count?: number;\n};'''
          if selected_type not in builder:
              raise SystemExit('SelectedQuestion type anchor not found.')
          builder = builder.replace(selected_type, selected_replacement, 1)

          state_anchor = '''  const [selectedQuestions, setSelectedQuestions] = useState<SelectedQuestion[]>([]);\n'''
          state_replacement = state_anchor + '  const [replacingQuestionId, setReplacingQuestionId] = useState("");\n'
          if state_anchor not in builder:
              raise SystemExit('Selected questions state anchor not found.')
          builder = builder.replace(state_anchor, state_replacement, 1)

          select_old = '''.select("id,question_id,section_id,display_order,marks,negative_marks,is_mandatory,is_locked,generation_source,shuffle_restricted,position_locked,is_bonus,is_cancelled,grace_marks,metadata,question_snapshot")'''
          select_new = '''.select("id,question_id,section_id,display_order,marks,negative_marks,is_mandatory,is_locked,generation_source,blueprint_rule_id,shuffle_restricted,position_locked,is_bonus,is_cancelled,grace_marks,metadata,question_snapshot")'''
          if select_old not in builder:
              raise SystemExit('Paper question select anchor not found.')
          builder = builder.replace(select_old, select_new, 1)

          mapping_anchor = '''      (questionsResult.data || []).map((question) => ({\n        question_id: question.question_id,'''
          mapping_replacement = '''      (questionsResult.data || []).map((question) => ({\n        paper_question_id: question.id,\n        blueprint_rule_id: question.blueprint_rule_id || null,\n        question_id: question.question_id,'''
          if mapping_anchor not in builder:
              raise SystemExit('Paper question mapping anchor not found.')
          builder = builder.replace(mapping_anchor, mapping_replacement, 1)

          validation_anchor = '''  async function runValidation() {\n'''
          replacement_function = '''  async function replaceGeneratedQuestion(question: SelectedQuestion) {\n    if (!supabase || !question.paper_question_id) {\n      setError("Save and regenerate the paper before replacing this question.");\n      return;\n    }\n    if (question.is_locked) {\n      setError("Unlock this question before replacing it.");\n      return;\n    }\n    setReplacingQuestionId(question.question_id);\n    setError("");\n    setNotice("");\n    const { error: replacementError } = await supabase.rpc("replace_paper_question_v8", {\n      p_paper_question_id: question.paper_question_id,\n      p_seed: null,\n    });\n    setReplacingQuestionId("");\n    if (replacementError) {\n      setError(replacementError.message);\n      return;\n    }\n    setNotice("Generated question replaced with another eligible approved question.");\n    await load();\n  }\n\n'''
          if validation_anchor not in builder:
              raise SystemExit('Validation function anchor not found.')
          builder = builder.replace(validation_anchor, replacement_function + validation_anchor, 1)

          remove_button = '''<button title="Remove question" onClick={() => removeQuestion(question.question_id)} className="danger"><Trash2 size={15} /></button>'''
          replacement_button = '''{question.blueprint_rule_id && <button title="Replace generated question" disabled={Boolean(question.is_locked) || replacingQuestionId === question.question_id} onClick={() => void replaceGeneratedQuestion(question)}>{replacingQuestionId === question.question_id ? <LoaderCircle className="spin" size={15} /> : <RefreshCw size={15} />}</button>}<button title="Remove question" onClick={() => removeQuestion(question.question_id)} className="danger"><Trash2 size={15} /></button>'''
          if remove_button not in builder:
              raise SystemExit('Arrangement remove button anchor not found.')
          builder = builder.replace(remove_button, replacement_button, 1)

          lifecycle_block = '''              <PaperLifecyclePanel\n                paperId={paperId}\n                workflowStatus={workflowStatus}\n                onWorkflowChange={setWorkflowStatus}\n              />'''
          lifecycle_extended = lifecycle_block + '''\n              <PaperTemplatePanel\n                paperId={paperId}\n                kind={kind}\n                organizationId={kind === "admin" ? null : organizationId}\n                base={base}\n              />\n              <PaperExportPanel paperId={paperId} />\n              <PaperAuditPanel paperId={paperId} />'''
          if lifecycle_block not in builder:
              raise SystemExit('Lifecycle render block not found.')
          builder = builder.replace(lifecycle_block, lifecycle_extended, 1)
          builder_path.write_text(builder)

          list_path = Path('src/components/papers/QuestionPaperList.tsx')
          paper_list = list_path.read_text()
          list_import_anchor = 'import { useQuestionScope } from "@/components/questions/useQuestionScope";\n'
          template_import = 'import { PaperTemplatePanel } from "@/components/papers/PaperTemplatePanel";\n'
          if template_import not in paper_list:
              if list_import_anchor not in paper_list:
                  raise SystemExit('Paper list import anchor not found.')
              paper_list = paper_list.replace(list_import_anchor, list_import_anchor + template_import, 1)

          table_anchor = '''      <section className="rm-card" style={{ marginTop: 16, overflow: "hidden" }}>'''
          template_render = '''      <PaperTemplatePanel\n        paperId={null}\n        kind={kind}\n        organizationId={kind === "admin" ? null : organizationId}\n        base={base}\n      />\n\n'''
          if table_anchor not in paper_list:
              raise SystemExit('Paper list table anchor not found.')
          paper_list = paper_list.replace(table_anchor, template_render + table_anchor, 1)
          list_path.write_text(paper_list)

          Path('.github/workflows/v8-final-ui-integration.yml').unlink()
          PY

      - name: Commit final UI integration
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/components/papers/QuestionPaperBuilder.tsx src/components/papers/QuestionPaperList.tsx .github/workflows/v8-final-ui-integration.yml
          git commit -m "Integrate V8 templates exports audit and replacement"
          git push origin HEAD:evidara-v8-papers
