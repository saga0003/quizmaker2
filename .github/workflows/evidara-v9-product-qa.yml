name: Evidara V9 Product QA

on:
  push:
    branches:
      - evidara-v9-product-catalogue
  pull_request:
    branches:
      - evidara-v8-paper-builder
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: evidara-v9-product-qa-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Lint, typecheck, smoke and build
    runs-on: ubuntu-latest
    timeout-minutes: 40
    env:
      NEXT_TELEMETRY_DISABLED: "1"
      NEXT_PUBLIC_APP_URL: http://localhost:3000
    steps:
      - name: Check out V9 product branch
        uses: actions/checkout@v4
      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install locked dependencies
        run: npm ci --no-audit --no-fund
      - name: Run lint report
        run: |
          set +e
          npm run lint > v9-lint.txt 2>&1
          echo "$?" > v9-lint.status
          cat v9-lint.txt
          exit 0
      - name: Upload lint report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: evidara-v9-lint-report
          path: |
            v9-lint.txt
            v9-lint.status
          retention-days: 1
      - name: Enforce lint
        run: test "$(cat v9-lint.status)" = "0"
      - name: Run TypeScript report
        run: |
          set +e
          npm run typecheck > v9-typecheck.txt 2>&1
          echo "$?" > v9-typecheck.status
          cat v9-typecheck.txt
          exit 0
      - name: Upload TypeScript report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: evidara-v9-typecheck-report
          path: |
            v9-typecheck.txt
            v9-typecheck.status
          retention-days: 1
      - name: Enforce TypeScript
        run: test "$(cat v9-typecheck.status)" = "0"
      - name: V8 paper smoke checks
        run: node scripts/v8-paper-smoke.mjs
      - name: V9 product smoke checks
        run: node scripts/v9-product-smoke.mjs
      - name: Next.js production build
        run: npm run build
