name: Deploy Evidara to Cloudflare

on:
  workflow_dispatch:

concurrency:
  group: evidara-cloudflare-production
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY }}
      NEXT_PUBLIC_APP_URL: ${{ secrets.NEXT_PUBLIC_APP_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Validate required deployment secrets
        shell: bash
        run: |
          test -n "$CLOUDFLARE_API_TOKEN" || (echo "Missing CLOUDFLARE_API_TOKEN" && exit 1)
          test -n "$CLOUDFLARE_ACCOUNT_ID" || (echo "Missing CLOUDFLARE_ACCOUNT_ID" && exit 1)
          test -n "$NEXT_PUBLIC_SUPABASE_URL" || (echo "Missing NEXT_PUBLIC_SUPABASE_URL" && exit 1)
          test -n "$NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY" || (echo "Missing NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY" && exit 1)
          test -n "$SUPABASE_SERVICE_ROLE_KEY" || (echo "Missing SUPABASE_SERVICE_ROLE_KEY" && exit 1)

      - name: Install application dependencies
        run: npm ci

      - name: Validate application
        run: npm run check

      - name: Build OpenNext worker
        run: npm run cf:build

      - name: Deploy Worker and static assets
        run: npx --yes wrangler@latest deploy

      - name: Apply server-only Worker secrets
        shell: bash
        run: |
          node <<'NODE'
          const fs = require('node:fs');
          const values = {
            SUPABASE_SERVICE_ROLE_KEY: process.env.SUPABASE_SERVICE_ROLE_KEY,
          };
          fs.writeFileSync('/tmp/evidara-worker-secrets.json', JSON.stringify(values));
          NODE
          npx --yes wrangler@latest secret bulk /tmp/evidara-worker-secrets.json
          rm -f /tmp/evidara-worker-secrets.json

      - name: Deployment summary
        run: |
          echo "Evidara V6.7.1 deployed to Cloudflare Workers."
          echo "Attach the production custom domain in Cloudflare after the first successful deployment."
