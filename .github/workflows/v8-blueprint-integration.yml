name: One-time V8 Blueprint Integration

on:
  push:
    branches:
      - evidara-v8-papers

permissions:
  contents: write

jobs:
  patch:
    if: github.event.head_commit.message == 'Trigger V8 blueprint integration'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: evidara-v8-papers

      - name: Integrate blueprint step into the builder
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('src/components/papers/QuestionPaperBuilder.tsx')
          text = path.read_text()

          import_anchor = 'import { useQuestionScope } from "@/components/questions/useQuestionScope";\n'
          import_line = 'import { PaperGenerationPanel } from "@/components/papers/PaperGenerationPanel";\n'
          if import_line not in text:
              if import_anchor not in text:
                  raise SystemExit('Builder import anchor not found.')
              text = text.replace(import_anchor, import_anchor + import_line, 1)

          step_anchor = '  { key: "questions", label: "Questions", icon: Search },\n  { key: "arrangement", label: "Arrangement", icon: GripVertical },'
          step_replacement = '  { key: "questions", label: "Questions", icon: Search },\n  { key: "blueprint", label: "Blueprint", icon: Sparkles },\n  { key: "arrangement", label: "Arrangement", icon: GripVertical },'
          if step_anchor not in text:
              raise SystemExit('Builder step anchor not found.')
          text = text.replace(step_anchor, step_replacement, 1)

          render_anchor = '          {activeStep === "arrangement" && (\n'
          render_block = '''          {activeStep === "blueprint" && (\n            <PaperGenerationPanel\n              paperId={paperId}\n              organizationId={kind === "admin" ? null : organizationId}\n              programmeCode={programmeCode}\n              subjects={subjects}\n              chapters={chapters}\n              topics={topics}\n              onGenerated={() => void load()}\n            />\n          )}\n\n'''
          if render_anchor not in text:
              raise SystemExit('Builder arrangement render anchor not found.')
          text = text.replace(render_anchor, render_block + render_anchor, 1)

          path.write_text(text)
          Path('.github/workflows/v8-blueprint-integration.yml').unlink()
          PY

      - name: Commit blueprint integration
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/components/papers/QuestionPaperBuilder.tsx .github/workflows/v8-blueprint-integration.yml
          git commit -m "Integrate V8 blueprint generation workspace"
          git push origin HEAD:evidara-v8-papers
