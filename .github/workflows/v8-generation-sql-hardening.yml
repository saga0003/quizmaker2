name: One-time V8 Generation SQL Hardening

on:
  push:
    branches:
      - evidara-v8-papers

permissions:
  contents: write

jobs:
  patch:
    if: github.event.head_commit.message == 'Trigger V8 generation SQL hardening'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: evidara-v8-papers

      - name: Harden migration 33
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('supabase/33_v8_paper_generation_engine.sql')
          text = path.read_text()

          begin_anchor = '''begin;\n\n-- ---------------------------------------------------------------------------\n-- Complete, unpaged eligibility query for database-side generation.\n'''
          forward = '''begin;\n\n-- Forward declaration used by save_paper_blueprints_v8. The complete\n-- implementation later in this migration replaces this temporary body.\ncreate or replace function public.refresh_paper_blueprint_availability_v8(\n  p_paper_id uuid\n)\nreturns jsonb\nlanguage plpgsql\nsecurity definer\nset search_path = public,auth\nas $$\nbegin\n  return jsonb_build_object(\n    'paper_id',p_paper_id,\n    'rules','[]'::jsonb,\n    'ready',false,\n    'refreshed_at',now()\n  );\nend\n$$;\n\n-- ---------------------------------------------------------------------------\n-- Complete, unpaged eligibility query for database-side generation.\n'''
          if begin_anchor not in text:
              raise SystemExit('Migration begin anchor not found.')
          text = text.replace(begin_anchor, forward, 1)

          text = text.replace('array_agg(token_value)', 'array_agg(programme_token.value)')
          text = text.replace(") token_value\n  where programme.code=", ") as programme_token(value)\n  where programme.code=")
          text = text.replace("encode(gen_random_bytes(12),'hex')", "replace(gen_random_uuid()::text,'-','')")

          unsafe_delete = '''    and (\n      p_rule_id is null\n      or paper_question.blueprint_rule_id=p_rule_id\n      or (\n        paper_question.blueprint_rule_id is null\n        and paper_question.section_id=(select section_id from public.paper_blueprints where id=p_rule_id)\n      )\n    );'''
          safe_delete = '''    and (p_rule_id is null or paper_question.blueprint_rule_id=p_rule_id);'''
          if unsafe_delete not in text:
              raise SystemExit('Rule regeneration delete condition not found.')
          text = text.replace(unsafe_delete, safe_delete, 1)

          snapshot_grant = '''grant execute on function public.paper_question_snapshot_v8(uuid)\nto authenticated,service_role;'''
          snapshot_secure = '''revoke all on function public.paper_question_snapshot_v8(uuid) from public,authenticated;\ngrant execute on function public.paper_question_snapshot_v8(uuid) to service_role;'''
          if snapshot_grant not in text:
              raise SystemExit('Snapshot grant not found.')
          text = text.replace(snapshot_grant, snapshot_secure, 1)

          path.write_text(text)
          Path('.github/workflows/v8-generation-sql-hardening.yml').unlink()
          PY

      - name: Commit SQL hardening
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add supabase/33_v8_paper_generation_engine.sql .github/workflows/v8-generation-sql-hardening.yml
          git commit -m "Harden V8 paper generation SQL"
          git push origin HEAD:evidara-v8-papers
