name: Evidara V10 Reference Analytics and Collections QA

on:
  push:
    branches:
      - agent/evidara-v10-analytics-reference-ui-question-collections
  pull_request:
    branches:
      - agent/evidara-v10-analytics-phase-4
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: evidara-v10-reference-analytics-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Lint, typecheck, smoke and build
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      NEXT_TELEMETRY_DISABLED: "1"
      NEXT_PUBLIC_APP_URL: http://localhost:3000
    steps:
      - name: Check out reference analytics branch
        uses: actions/checkout@v4
      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install locked dependencies
        run: npm ci --no-audit --no-fund
      - name: Lint
        run: npm run lint
      - name: TypeScript
        run: npm run typecheck
      - name: V8 paper smoke checks
        run: node scripts/v8-paper-smoke.mjs
      - name: V9 product smoke checks
        run: node scripts/v9-product-smoke.mjs
      - name: V10 analytics Phase 1 smoke checks
        run: node scripts/v10-analytics-phase1-smoke.mjs
      - name: V10 analytics Phase 2 smoke checks
        run: node scripts/v10-analytics-phase2-smoke.mjs
      - name: V10 analytics Phase 3 smoke checks
        run: node scripts/v10-analytics-phase3-smoke.mjs
      - name: V10 analytics Phase 4 smoke checks
        run: node scripts/v10-analytics-phase4-smoke.mjs
      - name: Reference analytics and Question Collections smoke checks
        run: node scripts/v10-analytics-reference-ui-smoke.mjs
      - name: Next.js production build
        run: npm run build
