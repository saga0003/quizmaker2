name: Fix V9 Product Lint

on:
  pull_request:
    branches:
      - evidara-v8-paper-builder
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: fix-v9-product-lint
  cancel-in-progress: false

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - name: Check out V9 product branch
        uses: actions/checkout@v4
        with:
          ref: evidara-v9-product-catalogue
          fetch-depth: 0
      - name: Add missing product workspace import
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('src/components/evidara/admin-views.tsx')
          value = path.read_text()
          import_line = "import { ProductCommerceWorkspace } from '@/components/commerce/ProductCommerceWorkspace';"
          if import_line not in value:
              needle = "} from '@/components/ui/tooltip';\n"
              if needle not in value:
                  raise SystemExit('Tooltip import block was not found.')
              value = value.replace(needle, needle + "\n" + import_line + "\n", 1)
              path.write_text(value)
          PY
          if git diff --quiet; then
            exit 0
          fi
          git config user.name "Evidara V9 Automation"
          git config user.email "actions@users.noreply.github.com"
          git add src/components/evidara/admin-views.tsx
          git commit -m "Fix V9 product workspace import"
          git push origin HEAD:evidara-v9-product-catalogue
