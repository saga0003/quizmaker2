name: V8 Source Export

on:
  push:
    branches:
      - evidara-v8-paper-builder
  workflow_dispatch:

permissions:
  contents: read

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Package source
        run: |
          zip -qr v8-source.zip . \
            -x '.git/*' 'node_modules/*' '.next/*' '.open-next/*'
      - name: Upload source
        uses: actions/upload-artifact@v4
        with:
          name: evidara-v8-source
          path: v8-source.zip
          retention-days: 1
