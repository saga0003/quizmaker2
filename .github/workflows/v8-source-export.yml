name: Apply V8 Academic Settings Upgrade

on:
  push:
    branches:
      - evidara-v8-paper-builder
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: apply-v8-academic-settings
  cancel-in-progress: false

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Check out V8 branch
        uses: actions/checkout@v4
        with:
          ref: evidara-v8-paper-builder
          fetch-depth: 0

      - name: Reconstruct and apply coordinated patch
        shell: bash
        run: |
          set -euo pipefail
          cat scripts/.v8-patch/part*.txt > /tmp/v8-settings.patch.gz.b64
          echo "4a1d275fbcbf312de68a498817213e9e650009caadc59d771944479844b1d4a0  /tmp/v8-settings.patch.gz.b64" | sha256sum -c -
          base64 -d /tmp/v8-settings.patch.gz.b64 | gunzip > /tmp/v8-settings.patch
          echo "6f0d9124a742cfd5bf9ce711723988cbd680e404fe5cace69bd280e05abb35cb  /tmp/v8-settings.patch" | sha256sum -c -
          git show 796d8ca56091ed30949b28f5c5d0a7614d256129:.github/workflows/v8-source-export.yml > .github/workflows/v8-source-export.yml
          patch --batch -p1 < /tmp/v8-settings.patch
          rm -rf scripts/.v8-patch
          node scripts/v8-paper-smoke.mjs

      - name: Commit upgraded modules
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "Evidara V8 Automation"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          git commit -m "Add configurable grades and academic settings"
          git push origin HEAD:evidara-v8-paper-builder
