name: Evidara V8 Phase 3 QA

on:
  push:
    branches:
      - evidara-v8-papers
  pull_request:
    branches:
      - evidara-v7-final
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: evidara-v8-phase3-qa-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate V8 Phase 3
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      NEXT_TELEMETRY_DISABLED: "1"
      NEXT_PUBLIC_APP_URL: http://localhost:3000
    steps:
      - name: Check out V8 Phase 3
        uses: actions/checkout@v4

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install locked dependencies
        run: npm ci --no-audit --no-fund

      - name: Run complete V8 Phase 3 QA
        run: npm run qa

      - name: Verify Cloudflare/OpenNext compatibility
        run: npm run cf:build

      - name: Verify Vercel deployment scope
        run: |
          node - <<'NODE'
          const config = require('./vercel.json');
          const deployment = config.git?.deploymentEnabled;
          const validDisabled = deployment === false;
          const validPhase3 = deployment && deployment['*'] === false && deployment['evidara-v8-papers'] === true;
          if (!validDisabled && !validPhase3) {
            throw new Error('Vercel must be disabled globally or enabled only for evidara-v8-papers.');
          }
          if (config.buildCommand !== 'npm run qa' && validPhase3) {
            throw new Error('Vercel Phase 3 deployment must run the complete npm run qa gate.');
          }
          console.log('V8 Phase 3 deployment scope is valid.');
          NODE

      - name: Confirm QA completion
        run: echo "Evidara V8 Phase 3 passed lint, TypeScript, all smoke contracts, Next.js build and Cloudflare/OpenNext build."
