name: Evidara V8 Responsive UI QA

on:
  push:
    branches:
      - evidara-v8-ui-refresh
      - evidara-v8-papers
  pull_request:
    branches:
      - evidara-v7-final
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: evidara-v8-ui-qa-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate V8 responsive UI
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      NEXT_TELEMETRY_DISABLED: "1"
      NEXT_PUBLIC_APP_URL: http://localhost:3000
    steps:
      - name: Check out V8 UI refresh
        uses: actions/checkout@v4

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install locked dependencies
        run: npm ci --no-audit --no-fund

      - name: Run complete V8 UI QA
        run: npm run qa

      - name: Verify Cloudflare/OpenNext compatibility
        run: npm run cf:build

      - name: Verify Vercel remains locked
        run: |
          node - <<'NODE'
          const config = require('./vercel.json');
          if (config.git?.deploymentEnabled !== false) {
            throw new Error('Vercel must remain completely disabled until the UI/UX refresh is reviewed.');
          }
          if (config.buildCommand !== 'npm run qa') {
            throw new Error('The future approved deployment must run the complete npm run qa gate.');
          }
          console.log('Vercel is locked and the future deployment gate is preserved.');
          NODE

      - name: Confirm QA completion
        run: echo "Evidara V8 UI refresh passed lint, TypeScript, Phase 1-3 contracts, responsive UI contracts, Next.js build and Cloudflare/OpenNext build."
