name: One-time V8 Lifecycle Integration

on:
  push:
    branches:
      - evidara-v8-papers

permissions:
  contents: write

jobs:
  patch:
    if: github.event.head_commit.message == 'Trigger V8 lifecycle integration'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: evidara-v8-papers

      - name: Integrate lifecycle controls and stable blueprint IDs
        run: |
          python - <<'PY'
          from pathlib import Path

          builder_path = Path('src/components/papers/QuestionPaperBuilder.tsx')
          builder = builder_path.read_text()

          import_anchor = 'import { PaperGenerationPanel } from "@/components/papers/PaperGenerationPanel";\n'
          lifecycle_import = 'import { PaperLifecyclePanel } from "@/components/papers/PaperLifecyclePanel";\n'
          if lifecycle_import not in builder:
              if import_anchor not in builder:
                  raise SystemExit('PaperGenerationPanel import anchor not found.')
              builder = builder.replace(import_anchor, import_anchor + lifecycle_import, 1)

          old_submit = '''    const { error: statusError } = await supabase.rpc("set_paper_workflow_status_v8", {\n      p_paper_id: paperId,\n      p_next_status: "submitted_for_review",\n      p_reason: null,\n    });'''
          new_submit = '''    const { error: statusError } = await supabase.rpc("submit_paper_review_v8", {\n      p_paper_id: paperId,\n      p_assigned_reviewer_id: null,\n      p_summary: null,\n    });'''
          if old_submit not in builder:
              raise SystemExit('Old submit-for-review RPC block not found.')
          builder = builder.replace(old_submit, new_submit, 1)

          preview_anchor = '              <article className="v8-paper-preview">'
          lifecycle_block = '''              <PaperLifecyclePanel\n                paperId={paperId}\n                workflowStatus={workflowStatus}\n                onWorkflowChange={setWorkflowStatus}\n              />\n              <article className="v8-paper-preview">'''
          if preview_anchor not in builder:
              raise SystemExit('Paper preview article anchor not found.')
          builder = builder.replace(preview_anchor, lifecycle_block, 1)
          builder_path.write_text(builder)

          generation_path = Path('src/components/papers/PaperGenerationPanel.tsx')
          generation = generation_path.read_text()
          payload_anchor = '''    const payload = rules.map((rule, index) => ({\n      section_id: rule.section_id,'''
          payload_replacement = '''    const payload = rules.map((rule, index) => ({\n      id: rule.id || null,\n      section_id: rule.section_id,'''
          if payload_anchor not in generation:
              raise SystemExit('Blueprint payload anchor not found.')
          generation = generation.replace(payload_anchor, payload_replacement, 1)
          generation_path.write_text(generation)

          Path('.github/workflows/v8-lifecycle-integration.yml').unlink()
          PY

      - name: Commit lifecycle integration
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/components/papers/QuestionPaperBuilder.tsx src/components/papers/PaperGenerationPanel.tsx .github/workflows/v8-lifecycle-integration.yml
          git commit -m "Integrate V8 paper lifecycle controls"
          git push origin HEAD:evidara-v8-papers
